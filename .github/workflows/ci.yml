name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, andros]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint with ruff
        run: python -m ruff check .

  test:
    runs-on: [self-hosted, andros]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: nex_ledger_test
        options: >-
          --health-cmd "pg_isready -U ledger -d nex_ledger_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-interaction
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+pg8000://ledger:ledger@localhost:5432/nex_ledger_test
        run: |
          python -m pytest tests/ -v || test $? -eq 5

  build:
    runs-on: [self-hosted, andros]
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nex-ledger:latest .
