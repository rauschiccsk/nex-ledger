name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: [self-hosted, andros]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run ruff
        run: poetry run ruff check .

  test:
    name: Run Tests
    runs-on: [self-hosted, andros]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nex_ledger
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nex_ledger_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pytest
        run: poetry run pytest -v --tb=short --cov=app
        env:
          DATABASE_URL: postgresql+pg8000://nex_ledger:test_password@localhost:5433/nex_ledger_test
          TEST_DATABASE_URL: postgresql+pg8000://nex_ledger:test_password@localhost:5433/nex_ledger_test

  build:
    name: Build Docker Image
    runs-on: [self-hosted, andros]
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nex-ledger:${{ github.sha }} .
