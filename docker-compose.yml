services:
  postgres:
    image: postgres:16-alpine
    container_name: nex-ledger-db
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger_dev_pass
      POSTGRES_DB: nex_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d nex_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nex-ledger-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+pg8000://ledger:ledger_dev_pass@postgres:5432/nex_ledger
      SECRET_KEY: dev_secret_key_change_in_production
      PORT: 9180
    ports:
      - "9180:9180"
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
