services:
  app:
    build: .
    ports:
      - "9180:9180"
    environment:
      - DATABASE_URL=postgresql+pg8000://ledger:ledger@db:5432/nex_ledger
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
      - POSTGRES_DB=nex_ledger
    ports:
      - "9181:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d nex_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
