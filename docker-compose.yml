services:
  app:
    build: .
    ports:
      - "9180:9180"
    environment:
      - DATABASE_URL=postgresql+pg8000://ledger:ledger@postgres:5432/nex_ledger
      - SECRET_KEY=dev-secret-change-in-production
    depends_on:
      - postgres
    volumes:
      - ./app:/app/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: nex_ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
