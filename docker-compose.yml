version: '3.8'

services:
  app:
    build: .
    ports:
      - "9180:9180"
    environment:
      - DATABASE_URL=postgresql+pg8000://ledger:ledger@postgres:5432/nex_ledger
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ledger-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
      - POSTGRES_DB=nex_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge

volumes:
  postgres-data:
