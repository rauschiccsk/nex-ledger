services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nex_ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger_dev_pass
    ports:
      - "9181:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d nex_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "9180:9180"
    environment:
      DATABASE_URL: postgresql+pg8000://ledger:ledger_dev_pass@postgres:5432/nex_ledger
      SECRET_KEY: dev-secret-key-change-in-production
      PORT: "9180"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
