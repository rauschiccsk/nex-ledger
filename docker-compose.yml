services:
  app:
    build: .
    ports:
      - "9180:9180"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ledger-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
      - POSTGRES_DB=nex_ledger
    ports:
      - "9181:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d nex_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge

volumes:
  postgres-data:
