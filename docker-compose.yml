version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nex-ledger-postgres
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: nex_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  ledger-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nex-ledger-api
    ports:
      - "9180:9180"
    environment:
      DATABASE_URL: postgresql+pg8000://ledger:ledger@postgres:5432/nex_ledger
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9180/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
