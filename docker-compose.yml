services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexledger-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+pg8000://ledger:ledger@db:5432/nex_ledger_test}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      APP_NAME: ${APP_NAME:-nex-ledger}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    networks:
      - nexledger-network

  db:
    image: postgres:16-alpine
    container_name: nexledger-db
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledger}
      POSTGRES_DB: nex_ledger
    ports:
      - "9181:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d nex_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexledger-network

volumes:
  pgdata:
    driver: local

networks:
  nexledger-network:
    driver: bridge
